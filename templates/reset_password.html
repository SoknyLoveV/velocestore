{% extends 'base.html' %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="container py-5 my-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="auth-card bg-white shadow-lg">
        <div class="text-center mb-4">
          <h2 class="fw-extrabold mb-1" style="font-family: var(--font-heading);">Reset Password</h2>
          <p class="text-muted small">Update your account credentials below</p>
        </div>

        <form action="{{ url_for('reset_password') }}" method="POST">
          <div class="mb-3">
            <label for="email" class="form-label text-muted small fw-semibold">Registered Email Address</label>
            <div class="input-group">
              <span class="input-group-text border-light bg-light text-muted"><i class="fas fa-envelope"></i></span>
              <input type="email" id="email" name="email" class="form-control form-control-custom" placeholder="you@example.com" required>
            </div>
          </div>

          <div class="mb-3">
            <label for="new_password" class="form-label text-muted small fw-semibold">New Password</label>
            <div class="input-group">
              <span class="input-group-text border-light bg-light text-muted"><i class="fas fa-key"></i></span>
              <input type="password" id="new_password" name="new_password" class="form-control form-control-custom" placeholder="Minimum 6 characters" minlength="6" required>
            </div>
          </div>

          <div class="mb-4">
            <label for="confirm_password" class="form-label text-muted small fw-semibold">Confirm New Password</label>
            <div class="input-group">
              <span class="input-group-text border-light bg-light text-muted"><i class="fas fa-shield-alt"></i></span>
              <input type="password" id="confirm_password" name="confirm_password" class="form-control form-control-custom" placeholder="Repeat new password" minlength="6" required>
            </div>
          </div>

          <button type="submit" class="btn btn-primary-custom w-100 py-3 mb-3">
            <i class="fas fa-sync-alt me-2"></i> Update Password
          </button>
        </form>

        <div class="text-center mt-3 pt-3 border-top border-light">
          <span class="text-muted small">Remember your password? </span>
          <a href="{{ url_for('login') }}" class="small text-decoration-none text-primary fw-bold">Sign In here</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
