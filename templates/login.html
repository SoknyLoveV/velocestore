{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="container py-5 my-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="auth-card bg-white shadow-lg">
        <div class="text-center mb-4">
          <h2 class="fw-extrabold mb-1" style="font-family: var(--font-heading);">Welcome Back</h2>
          <p class="text-muted small">Please sign in to access your account</p>
        </div>

        <form action="{{ url_for('login') }}" method="POST">
          <!-- Retain redirect path after login -->
          <input type="hidden" name="next" value="{{ next_url or '' }}">

          <div class="mb-3">
            <label for="email" class="form-label text-muted small fw-semibold">Email Address</label>
            <div class="input-group">
              <span class="input-group-text border-light bg-light text-muted"><i class="fas fa-envelope"></i></span>
              <input type="email" id="email" name="email" class="form-control form-control-custom" placeholder="you@example.com" required>
            </div>
          </div>

          <div class="mb-4">
            <div class="d-flex justify-content-between mb-1">
              <label for="password" class="form-label text-muted small fw-semibold mb-0">Password</label>
              <a href="{{ url_for('reset_password') }}" class="small text-decoration-none text-primary fw-medium">Forgot Password?</a>
            </div>
            <div class="input-group">
              <span class="input-group-text border-light bg-light text-muted"><i class="fas fa-lock"></i></span>
              <input type="password" id="password" name="password" class="form-control form-control-custom" placeholder="••••••••" required>
            </div>
          </div>

          <button type="submit" class="btn btn-primary-custom w-100 py-3 mb-3">
            <i class="fas fa-sign-in-alt me-2"></i> Sign In
          </button>
        </form>

        <div class="text-center mt-3 pt-3 border-top border-light">
          <span class="text-muted small">Don't have an account? </span>
          <a href="{{ url_for('register') }}" class="small text-decoration-none text-primary fw-bold">Register here</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
