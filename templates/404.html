{% extends 'base.html' %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="container py-5 my-5">
  <div class="row justify-content-center text-center">
    <div class="col-md-7 col-lg-6">
      <div class="mb-4 text-primary">
        <i class="fas fa-compass fa-6x py-3"></i>
      </div>
      <h1 class="display-1 fw-extrabold mb-2" style="font-family: var(--font-heading); background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">404</h1>
      <h2 class="h3 mb-3">Oops! Page Lost in Transit</h2>
      <p class="text-muted mb-4">
        We couldn't find the page you were looking for. It might have been relocated, deleted, or entered the wrong URL.
      </p>
      <div class="d-flex justify-content-center gap-3">
        <a href="{{ url_for('home') }}" class="btn btn-primary-custom px-4 py-3">
          <i class="fas fa-home me-2"></i> Go to Homepage
        </a>
        <a href="{{ url_for('products') }}" class="btn btn-secondary-custom px-4 py-3">
          <i class="fas fa-search me-2"></i> Browse Products
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
