<nav class="navbar navbar-expand-lg navbar-custom sticky-top py-3">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="{{ url_for('home') }}">
      <i class="fas fa-shopping-bag me-2"></i>
      <span>VeloceStore</span>
    </a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link {{ 'active text-primary' if request.path == '/' else '' }}" href="{{ url_for('home') }}">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {{ 'active text-primary' if request.path == '/products' else '' }}" href="{{ url_for('products') }}">Shop</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {{ 'active text-primary' if request.path == '/contact' else '' }}" href="{{ url_for('contact') }}">Contact</a>
        </li>
      </ul>
      <div class="d-flex align-items-center gap-3">
        <!-- Cart Link -->
        <a href="{{ url_for('cart_page') }}" class="position-relative text-dark text-decoration-none me-2">
          <i class="fas fa-shopping-cart fa-lg"></i>
          {% if cart_count > 0 %}
            <span class="badge-cart">{{ cart_count }}</span>
          {% endif %}
        </a>

        <!-- User Authentication Links -->
        {% if session.get('user') %}
          <div class="dropdown">
            <button class="btn btn-secondary-custom btn-sm dropdown-toggle d-flex align-items-center gap-2" type="button" id="userMenu" data-bs-toggle="dropdown" aria-expanded="false">
              <i class="fas fa-user-circle fa-lg"></i>
              <span>{{ session['user'].get('username') }}</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg mt-2" aria-labelledby="userMenu" style="border-radius: 12px;">
              <li>
                <a class="dropdown-item py-2 d-flex align-items-center gap-2" href="{{ url_for('account') }}">
                  <i class="fas fa-id-card text-muted"></i>
                  <span>My Account</span>
                </a>
              </li>
              <li><hr class="dropdown-divider"></li>
              <li>
                <a class="dropdown-item py-2 text-danger d-flex align-items-center gap-2" href="{{ url_for('logout') }}">
                  <i class="fas fa-sign-out-alt"></i>
                  <span>Logout</span>
                </a>
              </li>
            </ul>
          </div>
        {% else %}
          <a href="{{ url_for('login') }}" class="btn btn-secondary-custom btn-sm px-4">Login</a>
          <a href="{{ url_for('register') }}" class="btn btn-primary-custom btn-sm px-4">Register</a>
        {% endif %}
      </div>
    </div>
  </div>
</nav>
