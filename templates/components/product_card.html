<div class="product-card">
  <div class="product-img-wrapper">
    <img src="{{ product.image }}" alt="{{ product.title }}" class="product-img" loading="lazy">
  </div>
  <div class="product-body">
    <span class="product-category">{{ product.category }}</span>
    <a href="{{ url_for('product_detail', id=product.id) }}" class="text-decoration-none">
      <h5 class="product-title text-dark mb-2" title="{{ product.title }}">{{ product.title }}</h5>
    </a>
    <div class="d-flex justify-content-between align-items-center mt-auto">
      <span class="product-price mb-0">${{ "%.2f"|format(product.price) }}</span>
      {% if product.rating %}
        <span class="rating-badge" title="Rating: {{ product.rating.rate }} based on {{ product.rating.count }} reviews">
          <i class="fas fa-star"></i>
          <span>{{ product.rating.rate }}</span>
        </span>
      {% endif %}
    </div>
    <div class="mt-3">
      <div class="row g-2">
        <div class="col-8">
          <a href="{{ url_for('product_detail', id=product.id) }}" class="btn btn-secondary-custom btn-sm w-100 py-2 d-flex align-items-center justify-content-center gap-1">
            <i class="fas fa-eye"></i>
            <span>Details</span>
          </a>
        </div>
        <div class="col-4">
          <a href="{{ url_for('add_to_cart', id=product.id) }}" class="btn btn-primary-custom btn-sm w-100 py-2 d-flex align-items-center justify-content-center" title="Quick Add to Cart">
            <i class="fas fa-cart-plus"></i>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
