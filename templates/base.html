<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="VeloceStore - A premium ecommerce platform offering top-tier fashion, apparel, electronics, and jewelry.">
  <meta name="author" content="VeloceStore Team">
  <title>{% block title %}Premium E-Store{% endblock %} | VeloceStore</title>
  
  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  
  {% block head %}{% endblock %}
</head>
<body id="velocestore-app">

  <!-- Navbar Component -->
  {% include 'components/navbar.html' %}

  <!-- Flash Notification Component -->
  {% include 'components/flash.html' %}

  <!-- Main View Content -->
  <main class="flex-grow-1">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer Component -->
  {% include 'components/footer.html' %}

  <!-- Bootstrap 5 JS Bundle (Includes Popper) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  
  <!-- Main Script Block -->
  {% block scripts %}{% endblock %}
</body>
</html>
